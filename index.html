<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>GIẤC NGỦ KHỎE</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:white;
    padding:30px;
    border-radius:16px;
    width:360px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

h1{
    margin:0;
    font-size:24px;
}

.desc{
    font-size:13px;
    color:gray;
    margin:12px 0 18px;
}

select{
    width:100%;
    padding:8px;
    border-radius:8px;
    margin-top:10px;
}

.time-box{
    margin-top:14px;
    display:flex;
    justify-content:center;
    gap:10px;
}

.time-box select{
    width:90px;
}

#labelText{
    margin-top:14px;
    font-size:14px;
}

button{
    margin-top:18px;
    padding:10px;
    width:60%;
    background:#333;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.result{
    margin-top:20px;
}

.time{
    margin:6px auto;
    padding:8px;
    width:80%;
    border-radius:8px;
    background:rgba(0,0,0,0.05);
}

.good{color:green;font-weight:bold;}
.ok{color:orange;font-weight:bold;}
.bad{color:red;font-weight:bold;}

.note{
    margin-top:10px;
    font-size:12px;
    color:gray;
}
</style>
</head>

<body>

<div class="container">

<h1>GIẤC NGỦ KHỎE</h1>

<div class="desc">
Tối ưu giờ ngủ và thức dậy để bạn tỉnh táo và khỏe khoắn hơn mỗi ngày.
</div>

<select id="mode">
    <option value="wake">Tính giờ nên ngủ từ giờ muốn thức dậy</option>
    <option value="sleep">Tính giờ nên thức dậy từ giờ ngủ</option>
</select>

<div id="labelText">Tôi muốn thức dậy vào lúc:</div>

<div class="time-box">
    <select id="hour"></select> :
    <select id="minute"></select>
</div>

<button onclick="calculate()">Tính</button>

<div class="result" id="result"></div>

</div>

<script>

let hour = document.getElementById("hour");
for(let i=0;i<24;i++){
    let opt=document.createElement("option");
    opt.value=i;
    opt.text=i.toString().padStart(2,"0");
    hour.appendChild(opt);
}

let minute=document.getElementById("minute");
for(let i=0;i<60;i++){
    let opt=document.createElement("option");
    opt.value=i;
    opt.text=i.toString().padStart(2,"0");
    minute.appendChild(opt);
}

document.getElementById("mode").addEventListener("change",function(){
    document.getElementById("labelText").innerText =
    this.value==="wake"
    ? "Tôi muốn thức dậy vào lúc:"
    : "Tôi muốn đi ngủ vào lúc:";
});

function calculate(){
    let mode=document.getElementById("mode").value;
    let h=parseInt(hour.value);
    let m=parseInt(minute.value);

    let html="";

    if(mode==="wake"){
        html="Giờ nên đi ngủ:<br>";

        for(let i=6;i>=3;i--){
            let total=h*60+m-i*90;
            let hh=Math.floor((total/60)%24);
            let mm=total%60;

            if(mm<0){mm+=60;hh--;}
            if(hh<0)hh+=24;

            let cls=i>=5?"good":i===4?"ok":"bad";

            html+=`
            <div class="time ${cls}">
                ${hh.toString().padStart(2,"0")}:${mm.toString().padStart(2,"0")}
            </div>`;
        }
    }
    else{
        html="Giờ nên thức dậy:<br>";

        for(let i=3;i<=6;i++){
            let total=h*60+m+i*90;
            let hh=Math.floor((total/60)%24);
            let mm=total%60;

            if(mm<0){mm+=60;hh--;}
            if(hh<0)hh+=24;

            let cls=i>=5?"good":i===4?"ok":"bad";

            html+=`
            <div class="time ${cls}">
                ${hh.toString().padStart(2,"0")}:${mm.toString().padStart(2,"0")}
            </div>`;
        }
    }

    html+=`<div class="note">Xanh: tốt • Cam: tạm • Đỏ: không nên</div>`;
    document.getElementById("result").innerHTML=html;
}

</script>

</body>
</html>
